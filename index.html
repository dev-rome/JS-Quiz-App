<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
    <title>Quiz App</title>
  </head>
  <body>
    <header>
      <div id="subject-label" class="subject-label"></div>
      <div class="theme-toggle">
        <span aria-hidden="true">🌙</span>
        <label class="switch">
          <input type="checkbox" id="theme-checkbox" />
          <span class="slider"></span>
        </label>
        <span aria-hidden="true">☀️</span>
      </div>
    </header>
    <main>
      <div id="app">
        <section class="start-screen">
          <div class="intro">
            <h1><span class="intro-light">Welcome to the</span> Quiz App</h1>
            <p>Pick a subject to get started.</p>
          </div>

          <div class="quiz-column">
            <div class="steps">
              <!-- Step 1: Category -->
              <div class="step active" data-step="1">
                <ul id="category-list" class="choice-list"></ul>
              </div>

              <!-- Step 2: Difficulty -->
              <div class="step" data-step="2">
                <ul class="choice-list">
                  <li>
                    <button type="button" class="choice-card" data-value="">
                      <span class="choice-icon" aria-hidden="true">🎲</span>
                      <span class="choice-name">Any Difficulty</span>
                    </button>
                  </li>
                  <li>
                    <button type="button" class="choice-card" data-value="easy">
                      <span class="choice-icon" aria-hidden="true">🟢</span>
                      <span class="choice-name">Easy</span>
                    </button>
                  </li>
                  <li>
                    <button
                      type="button"
                      class="choice-card"
                      data-value="medium"
                    >
                      <span class="choice-icon" aria-hidden="true">🟡</span>
                      <span class="choice-name">Medium</span>
                    </button>
                  </li>
                  <li>
                    <button type="button" class="choice-card" data-value="hard">
                      <span class="choice-icon" aria-hidden="true">🔴</span>
                      <span class="choice-name">Hard</span>
                    </button>
                  </li>
                </ul>
              </div>

              <!-- Step 3: Number of questions -->
              <div class="step" data-step="3">
                <ul class="choice-list">
                  <li>
                    <button type="button" class="choice-card" data-value="5">
                      <span class="choice-name">5 Questions</span>
                    </button>
                  </li>
                  <li>
                    <button type="button" class="choice-card" data-value="10">
                      <span class="choice-name">10 Questions</span>
                    </button>
                  </li>
                  <li>
                    <button type="button" class="choice-card" data-value="15">
                      <span class="choice-name">15 Questions</span>
                    </button>
                  </li>
                  <li>
                    <button type="button" class="choice-card" data-value="20">
                      <span class="choice-name">20 Questions</span>
                    </button>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </section>

        <section class="question-screen hidden">
          <div class="question-info">
            <p id="question-progress" class="question-count">
              Question 1 of 10
            </p>
            <h1 id="question-text" class="question-text"></h1>
            <div class="progress-track">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
          </div>

          <div class="answer-column">
            <ul id="answer-list" class="answer-list"></ul>
            <button type="button" id="submit-btn" class="submit-btn">
              Submit Answer
            </button>
            <p id="answer-error" class="answer-error hidden">
              Please select an answer.
            </p>
          </div>
        </section>
      </div>
    </main>
    <footer>
      <!-- footer (added later) -->
    </footer>
  </body>
</html>
