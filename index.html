<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
    <title>Quiz App</title>
  </head>
  <body>
    <header>
      <!-- header -->
    </header>
    <main>
      <div id="app">
        <section class="start-screen">
          <div class="intro">
            <h1><span class="intro-light">Welcome to the</span> Quiz App</h1>
            <p>
              Choose a category, difficulty, and number of questions to begin.
            </p>
          </div>

          <ul class="subject-list">
            <li>
              <button type="button" class="subject-card" data-subject="9">
                <span class="subject-icon" aria-hidden="true">🧠</span>
                <span class="subject-name">General Knowledge</span>
              </button>
            </li>
            <li>
              <button type="button" class="subject-card" data-subject="17">
                <span class="subject-icon" aria-hidden="true">🔬</span>
                <span class="subject-name">Science &amp; Nature</span>
              </button>
            </li>
            <li>
              <button type="button" class="subject-card" data-subject="23">
                <span class="subject-icon" aria-hidden="true">📜</span>
                <span class="subject-name">History</span>
              </button>
            </li>
            <li>
              <button type="button" class="subject-card" data-subject="22">
                <span class="subject-icon" aria-hidden="true">🌍</span>
                <span class="subject-name">Geography</span>
              </button>
            </li>
          </ul>
        </section>
      </div>
    </main>

    <footer>
      <!-- footer -->
    </footer>
  </body>
</html>
